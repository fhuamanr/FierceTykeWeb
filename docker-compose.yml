services:
  backend:
    build:
      context: ./Backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-720}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://fiercetyke.com}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    environment:
      - SERVICE_FQDN_FRONTEND_80
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
